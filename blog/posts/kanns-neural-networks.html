Kolmogorov-Arnold Networks (KANs) represent a revolutionary approach to neural network architecture, drawing inspiration from the Kolmogorov-Arnold representation theorem. Unlike traditional Multi-Layer Perceptrons (MLPs) that use fixed activation functions on nodes, KANs place learnable activation functions on edges, fundamentally changing how neural networks learn and represent functions.

## The Mathematical Foundation

### Kolmogorov-Arnold Representation Theorem

The foundation of KANs lies in the Kolmogorov-Arnold representation theorem, which states that any multivariate continuous function $f: [0,1]^n \\rightarrow \\mathbb{R}$ can be represented as:

$$f(x_1, x_2, \\ldots, x_n) = \\sum_{q=1}^{2n+1} \\Phi_q \\left( \\sum_{p=1}^{n} \\phi_{q,p}(x_p) \\right)$$

where $\\Phi_q: \\mathbb{R} \\rightarrow \\mathbb{R}$ and $\\phi_{q,p}: [0,1] \\rightarrow \\mathbb{R}$ are univariate continuous functions.

### Traditional MLP vs KAN Architecture

In a traditional MLP, the computation at layer $l$ is:

$$x^{(l+1)} = \\sigma \\left( W^{(l)} x^{(l)} + b^{(l)} \\right)$$

where:
- $W^{(l)} \\in \\mathbb{R}^{d_{l+1} \\times d_l}$ is the weight matrix
- $b^{(l)} \\in \\mathbb{R}^{d_{l+1}}$ is the bias vector
- $\\sigma$ is a fixed activation function (e.g., ReLU, tanh)

In contrast, a KAN replaces the linear transformation with learnable univariate functions on edges:

$$x_j^{(l+1)} = \\sum_{i=1}^{d_l} \\phi_{l,i,j}(x_i^{(l)}), \\quad j = 1, 2, \\ldots, d_{l+1}$$

where $\\phi_{l,i,j}: \\mathbb{R} \\rightarrow \\mathbb{R}$ are learnable univariate functions.

## KAN Architecture Details

### Spline-Based Activation Functions

KANs use B-splines to parameterize the learnable activation functions. A B-spline of order $k$ with knots $t_0 < t_1 < \\ldots < t_m$ is defined as:

$$B_{i,k}(x) = \\frac{x - t_i}{t_{i+k} - t_i} B_{i,k-1}(x) + \\frac{t_{i+k+1} - x}{t_{i+k+1} - t_{i+1}} B_{i+1,k-1}(x)$$

with the base case:

$$B_{i,0}(x) = \\begin{cases}
1 & \\text{if } t_i \\leq x < t_{i+1} \\\\
0 & \\text{otherwise}
\\end{cases}$$

The activation function $\\phi(x)$ is then parameterized as:

$$\\phi(x) = w_b b_b(x) + w_s \\sum_{i} c_i B_i(x)$$

where:
- $b_b(x)$ is a base function (e.g., $\\mathrm{SiLU}(x) = \\frac{x}{1 + e^{-x}}$)
- $B_i(x)$ are B-spline basis functions
- $w_b$, $w_s$, and $c_i$ are learnable parameters

### Forward Pass

For a KAN layer with input dimension $d_{in}$ and output dimension $d_{out}$, the forward pass computes:

$$y_j = \\sum_{i=1}^{d_{in}} \\phi_{i,j}(x_i), \\quad j = 1, 2, \\ldots, d_{out}$$

This can be written in matrix form as:

$$\\mathbf{y} = \\begin{bmatrix}
\\sum_{i=1}^{d_{in}} \\phi_{i,1}(x_i) \\\\
\\sum_{i=1}^{d_{in}} \\phi_{i,2}(x_i) \\\\
\\vdots \\\\
\\sum_{i=1}^{d_{in}} \\phi_{i,d_{out}}(x_i)
\\end{bmatrix}$$

## Key Advantages

### 1. Interpretability

KANs are more interpretable than MLPs because:
- Each edge function $\\phi_{i,j}$ can be visualized
- The learned functions often correspond to meaningful mathematical operations
- Feature interactions are explicit in the architecture

### 2. Accuracy

KANs can achieve higher accuracy with fewer parameters:

$$N_{\\mathrm{KAN}} = O(d^2 G)$$

where $d$ is the width and $G$ is the number of grid points for splines, compared to:

$$N_{\\mathrm{MLP}} = O(d^2 L)$$

where $L$ is the number of layers.

### 3. Scalability

The Kolmogorov-Arnold theorem suggests that KANs can represent complex functions more efficiently:

$$C_{\\mathrm{KAN}} = O(n(2n+1)) = O(n^2)$$

compared to potentially exponential complexity in MLPs for certain function classes.

## Training KANs

### Loss Function

The training objective combines task-specific loss and regularization:

$$L = L_t + \\lambda_1 L_r + \\lambda_2 L_e$$

where:
- $L_t$ is the primary loss (e.g., MSE, cross-entropy)
- $L_r$ (regularization term) penalizes large function values
- $L_e$ (entropy term) encourages sparsity in the learned functions

### Regularization Terms

The regularization term is:

$$L_r = \\sum_{l,i,j} \\int \\left| \\frac{d^2 \\phi_{l,i,j}}{dx^2} \\right|^2 dx$$

This encourages smooth activation functions.

The entropy term promotes sparsity:

$$L_e = -\\sum_{l,i,j} p_{l,i,j} \\log p_{l,i,j}$$

where $p_{l,i,j}$ is the normalized importance of edge $(i,j)$ in layer $l$.

## Mathematical Properties

### Universal Approximation

KANs inherit the universal approximation property from the Kolmogorov-Arnold theorem:

**Theorem**: For any continuous function $f: [0,1]^n \\rightarrow \\mathbb{R}$ and $\\epsilon > 0$, there exists a KAN with finite width such that:

$$\\|f - f_{\\mathrm{KAN}}\\|_\\infty < \\epsilon$$

### Gradient Flow

The gradient with respect to spline coefficients is:

$$\\frac{\\partial L}{\\partial c_i} = \\sum_{j} \\frac{\\partial L}{\\partial y_j} \\frac{\\partial y_j}{\\partial c_i} = \\sum_{j} \\frac{\\partial L}{\\partial y_j} B_i(x)$$

This enables efficient backpropagation through the spline basis functions.

## Practical Example: Function Approximation

Consider approximating the function:

$$f(x_1, x_2) = \\exp(\\sin(\\pi x_1) + x_2^2)$$

A KAN can learn this decomposition:

$$f(x_1, x_2) \\approx \\Phi_1(\\phi_{1,1}(x_1) + \\phi_{1,2}(x_2)) + \\Phi_2(\\phi_{2,1}(x_1) + \\phi_{2,2}(x_2))$$

where each $\\phi_{i,j}$ learns the appropriate univariate transformation.

## Comparison with MLPs

| Aspect | MLP | KAN |
|--------|-----|-----|
| Activation Location | Nodes | Edges |
| Function Representation | Fixed | Learnable |
| Interpretability | Low | High |
| Parameter Efficiency | Moderate | High |
| Training Speed | Fast | Moderate |

## Conclusion

Kolmogorov-Arnold Networks represent a paradigm shift in neural network design, moving from fixed activations on nodes to learnable functions on edges. This architecture offers:

1. **Better interpretability** through visualizable edge functions
2. **Higher accuracy** with fewer parameters
3. **Stronger theoretical foundation** based on the Kolmogorov-Arnold theorem
4. **Improved scalability** for certain function classes

The mathematical elegance of KANs, combined with their practical advantages, makes them a promising direction for future neural network research, particularly in scientific computing and applications requiring interpretable models.

## References

- Liu, Z., et al. (2024). "KAN: Kolmogorov-Arnold Networks"
- Kolmogorov, A. N. (1957). "On the representation of continuous functions of many variables"
- Arnold, V. I. (1957). "On functions of three variables"
